[build]
  command = "npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # The scheduled function imports lib/server/push.ts which uses
  # @netlify/blobs + web-push from the project's package.json.
  included_files = ["lib/server/**", "package.json"]
  external_node_modules = ["@netlify/blobs", "web-push"]

# The Next.js runtime auto-detected by Netlify handles Next routes,
# the /api/push/* endpoints, and static asset serving. The scheduled
# function below is independent of that pipeline.

[[plugins]]
  package = "@netlify/plugin-nextjs"
